<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Who Read Me</h1>
      <label>
        API origin
        <input id="apiOrigin" type="url">
      </label>
      <label>
        Extension token
        <textarea id="extensionToken" rows="5"></textarea>
      </label>
      <label>
        Sender email
        <input id="senderEmail" type="email" placeholder="you@example.com">
      </label>
      <button id="saveButton" type="button">Save</button>
      <p id="statusText"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
