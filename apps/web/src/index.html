<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Who Read Me</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Who Read Me</h1>
          <p>Self-hosted Gmail tracking and tracker detection on Cloudflare.</p>
        </div>
        <button id="gmailLinkButton" type="button" disabled>Link Gmail</button>
      </header>

      <section class="panel">
        <h2>Deployment</h2>
        <dl>
          <div>
            <dt>Status</dt>
            <dd id="statusText">Checking session...</dd>
          </div>
          <div>
            <dt>Access</dt>
            <dd class="accessControls">
              <form id="accessForm" class="inlineForm">
                <input id="authEmailInput" type="email" placeholder="Owner email" autocomplete="email">
                <button id="requestAccessButton" type="submit">Send link</button>
              </form>
              <form id="codeForm" class="inlineForm">
                <input id="authCodeInput" inputmode="numeric" maxlength="6" placeholder="One-time code" autocomplete="one-time-code">
                <button id="verifyAccessButton" type="submit">Verify</button>
              </form>
            </dd>
          </div>
          <div>
            <dt>API origin</dt>
            <dd><input id="apiOriginInput" type="url" value="http://localhost:8787"></dd>
          </div>
        </dl>
      </section>

      <section class="metrics" id="metricsGrid">
        <article><strong>0</strong><span>Messages</span></article>
        <article><strong>0</strong><span>Recipients</span></article>
        <article><strong>0</strong><span>Opens</span></article>
        <article><strong>0</strong><span>Clicks</span></article>
        <article><strong>0</strong><span>Tracker warnings</span></article>
      </section>

      <section class="panel">
        <div class="sectionHeader">
          <h2>Extension Pairing</h2>
          <button id="pairButton" type="button">Create token</button>
        </div>
        <pre id="pairingOutput">Pair the extension after signing in.</pre>
        <div id="pairingsOutput" class="tokenList"></div>
      </section>

      <section class="panel">
        <div class="sectionHeader">
          <h2>Tracked Messages</h2>
          <div class="toolbar">
            <input id="searchInput" placeholder="Search messages">
            <button id="exportButton" type="button">Export CSV</button>
            <button id="refreshButton" type="button">Refresh</button>
          </div>
        </div>
        <div id="messagesOutput" class="messageList"></div>
      </section>

      <section class="panel">
        <h2>Message Lookup</h2>
        <form id="summaryForm">
          <input id="messageIdInput" placeholder="msg_..." autocomplete="off">
          <button type="submit">Load summary</button>
        </form>
        <div id="summaryOutput" class="summaryGrid"></div>
        <div id="eventsOutput" class="eventList"></div>
      </section>

      <section class="panel">
        <h2>Settings</h2>
        <form id="settingsForm" class="settingsForm">
          <label>
            Retention days
            <input id="retentionDaysInput" type="number" min="1" max="3650">
          </label>
          <label>
            Dedupe window minutes
            <input id="dedupeWindowInput" type="number" min="1" max="1440">
          </label>
          <label class="checkboxLabel">
            <input id="trackerWarningsInput" type="checkbox">
            Tracker warnings enabled
          </label>
          <button type="submit">Save settings</button>
        </form>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
